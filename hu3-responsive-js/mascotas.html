<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Mascotas - Responsive</title>
    <link rel="stylesheet" href="style.min.css">
</head>

<body>

    <header class="header">
        <h1>Mis Mascotas</h1>
        <nav class="nav">
            <ul class="nav-menu">
                <li><a href="index.html" class="btn-secondary">← Volver</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="card text-center">
            <h2 class="mb-4">Mis compañeros de vida</h2>

            <!-- Grid responsivo para la galería -->
            <div class="grid-galeria">
                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&w=400&q=80"
                        alt="Perro Beagle" class="img-responsive">
                    <div class="pet-info">
                        <h3>Toby</h3>
                        <p>Compañero incondicional.</p>
                    </div>
                </article>

                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=400&q=80"
                        alt="Gato naranja" class="img-responsive">
                    <div class="pet-info">
                        <h3>Garfield</h3>
                        <p>Amante de la siesta.</p>
                    </div>
                </article>

                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1525253086316-d0c936c814f8?auto=format&fit=crop&w=400&q=80"
                        alt="Loro verde" class="img-responsive">
                    <div class="pet-info">
                        <h3>Paco</h3>
                        <p>El cantante del hogar.</p>
                    </div>
                </article>

                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1548247416-ec66f4900b2e?auto=format&fit=crop&w=400&q=80"
                        alt="Gato Siames" class="img-responsive">
                    <div class="pet-info">
                        <h3>Mishi</h3>
                        <p>Dueña de la casa.</p>
                    </div>
                </article>

                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1537151608804-ea2aa146a506?auto=format&fit=crop&w=400&q=80"
                        alt="Perro Golden" class="img-responsive">
                    <div class="pet-info">
                        <h3>Rex</h3>
                        <p>Energía pura y abrazos.</p>
                    </div>
                </article>

                <article class="pet-card">
                    <img src="https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&w=400&q=80"
                        alt="Hámster" class="img-responsive">
                    <div class="pet-info">
                        <h3>Bolita</h3>
                        <p>Rápido y curioso.</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tobías Atehortúa. Diseño Responsivo aplicado.</p>
    </footer>

    <!-- Script básico -->
    <script src="script.js"></script>
</body>

</html>
